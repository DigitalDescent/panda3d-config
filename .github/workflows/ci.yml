# ──────────────────────────────────────────────────────────────────────────────
# CI / CD - Build and publish the package on push to main/master or on 
# tagged releases. 
# ──────────────────────────────────────────────────────────────────────────────
name: Continuous Integration

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
    branches: [master, main]

permissions:
  contents: write
  id-token: write

concurrency:
  group: build-app-${{ github.ref }}
  cancel-in-progress: true

# ══════════════════════════════════════════════════════════════════════════════
jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Build wheels  -  one job per (platform × Python version)
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: "Build / ${{ matrix.os }} / py${{ matrix.python-version }}"
    if: >-
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !contains(github.event.head_commit.message, '[ci skip]')

    strategy:
      fail-fast: false
      matrix:
        os: 
        - windows-latest
        - ubuntu-latest
        - macos-latest
        python-version: 
        - "3.14"

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        submodules: recursive
        fetch-depth: 0           # setuptools-scm needs full history + tags

    - name: Setup Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Build Module
      uses: ./.github/actions/build-module

    - name: Upload wheel artifact
      uses: actions/upload-artifact@v6
      with:
        name: wheel-${{ matrix.os }}-py${{ matrix.python-version }}
        path: dist/*.whl
        if-no-files-found: error

  # ────────────────────────────────────────────────────────────────────────────
  # Publish to PyPI (tagged releases only)
  # ────────────────────────────────────────────────────────────────────────────
  publish:
    name: Deploy / PyPI
    needs: build
    runs-on: ubuntu-latest

    permissions:
      id-token: write          # required for trusted publishing

    environment:
      name: pypi
      url: https://pypi.org/p/panda3d-config

    steps:
    - name: Download all wheel artifacts
      uses: actions/download-artifact@v6
      with:
        path: dist
        pattern: wheel-*
        merge-multiple: true

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1

  # ────────────────────────────────────────────────────────────────────────────
  # GitHub Release (tagged releases only)
  # ────────────────────────────────────────────────────────────────────────────
  github-release:
    name: Deploy / GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write          # required to create releases

    steps:
    - name: Download all wheel artifacts
      uses: actions/download-artifact@v6
      with:
        path: dist
        pattern: wheel-*
        merge-multiple: true

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: ${{ github.ref_name }}
        generate_release_notes: true
        files: dist/*.whl